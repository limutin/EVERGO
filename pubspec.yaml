name: evergo_bus_tracker
description: "Evergo Dipolog-Dapitan Route Bus Tracker - Modern Flutter Bus Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Navigation
  go_router: ^14.2.7

  # Fonts
  google_fonts: ^6.2.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.68.0

  # Storage
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.19.0

  # SVG Support
  flutter_svg: ^2.0.10+1

  # Animations
  lottie: ^3.1.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
